services:
  postgres:
    build: ./infra/postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-h2oflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-h2oflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-h2oflow}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL:      postgres://${POSTGRES_USER:-h2oflow}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-h2oflow}?sslmode=disable
      ANTHROPIC_API_KEY:  ${ANTHROPIC_API_KEY}
      VOYAGE_API_KEY:     ${VOYAGE_API_KEY}
      SUPABASE_JWKS_URL:  ${SUPABASE_JWKS_URL}
      APP_PORT:          "8080"
      APP_DOMAIN:        h2oflows.app
    depends_on:
      postgres:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
